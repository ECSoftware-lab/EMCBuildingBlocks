syntax = "proto3";

option csharp_namespace = "EMC.Address.Protos";

import "google/protobuf/empty.proto";
package address;

message CreateAddressRequest {
  string street = 1;
  string streetNumber = 2;
  string floor = 3;
  string floorLetter = 4;
  string complement = 5;
  string zipcode = 6;
  int32 city = 7;
  string state = 8;
  string country = 9;
  string addressId = 10;
}

message CreateAddressResponse {
  string addressId = 1;
  string addressIdReal = 2;
}

message AddressByIdRequest {
  string id = 1;
}

message AddressDto {
  string street = 1;
  string streetNumber = 2;
  string floor = 3;
  string floorLetter = 4;
  string complement = 5;
  string zipcode = 6;
  string city = 7;
  string state = 8;
  string country = 9;
  int32 cityid=10;
   string addressId=11;
}
message CreateAddressItemResult {
  CreateAddressRequest request = 1;
  CreateAddressResponse response = 2;
  bool success = 3;
  string errorMessage = 4;
}

message CreateListAddressRequest {
  repeated CreateAddressRequest addresses = 1;
}

message CreateListAddressResponse {
  repeated CreateAddressItemResult results = 1;
}

service AddressProtoService{
	rpc GetAddressById(AddressByIdRequest) returns(AddressDto);
	rpc CreateAddress(CreateAddressRequest) returns(CreateAddressResponse);
  rpc CreateListAddress(CreateListAddressRequest) returns (CreateListAddressResponse);
}
 